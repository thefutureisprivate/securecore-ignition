---
variant: 'fcos'
version: '1.6.0'

passwd:
  users:
    - name: 'thefutureisprivate'
      groups:
        - 'wheel'
      password_hash: '$y$j9T$9MYl7G1vSZbv1TcWT57iu1$uXrbU3ZDbDhs4EWJWcJYVLekCAZ.Rf8CCVih1V/XRT8'
      ssh_authorized_keys:
        - 'sk-ssh-ed25519@openssh.com AAAAGnNrLXNzaC1lZDI1NTE5QG9wZW5zc2guY29tAAAAIBfXZD+wGDP7EXhQODSRVL4LsGYJziYnMOMkOquiHrGgAAAAFnNzaDp0aGVmdXR1cmVpc3ByaXZhdGU= contact@thefutureisprivate.dev' # yamllint disable rule:line-length

systemd:
  units:
    - name: 'rebase.service'
      enabled: true
      # yamllint disable rule:line-length
      contents: "[Unit]\n\
        Description=Rebase system to securecore\n\
        # We run after `systemd-machine-id-commit.service` to ensure that\n\
        # `ConditionFirstBoot=true` services won't rerun on the next boot.\n\
        After=systemd-machine-id-commit.service\n\
        After=network-online.target\n\
        Before=zincati.service\n\
        ConditionPathExists=!/var/lib/%N.stamp\n\
        [Service]\n\
        Type=oneshot\n\
        RemainAfterExit=yes\n\
        ExecStart=/usr/bin/systemctl disable --now zincati.service\n\
        ExecStart=/usr/bin/systemctl stop rpm-ostreed-automatic.timer rpm-ostreed-automatic.service\n\
        ExecStart=/usr/bin/rpm-ostree rebase ostree-image-signed:docker://ghcr.io/secureblue/securecore-main-hardened:latest\n\
        ExecStart=/usr/bin/cp /usr/etc/containers/policy.json /etc/containers/policy.json\n\
        ExecStart=/usr/bin/rm /etc/pki/containers/secureblue-2025.pub\n\
        ExecStart=/usr/bin/systemctl start gvisor-auto-update.service\n\
        ExecStart=/usr/bin/touch /var/lib/%N.stamp\n\
        ExecStart=/usr/bin/systemctl --no-block reboot\n\
        [Install]\n\
        WantedBy=multi-user.target"
      # yamllint enable rule:line-length

    - name: 'postrebase.service'
      enabled: true
      # yamllint disable rule:line-length
      contents: "[Unit]\n\
        ConditionPathExists=/var/lib/rebase.stamp\n\
        [Service]\n\
        Type=oneshot\n\
        RemainAfterExit=yes\n\
        ExecStart=/usr/bin/systemctl mask --now zincati.service\n\
        ExecStart=/usr/bin/bash -c \"/usr/bin/printf 'n\\ny\\ny\\n' | /usr/bin/ujust set-kargs-hardening\"\n\
        ExecStart=/usr/bin/bash -c \"/usr/bin/printf 'secureblue\\nsecureblue\\n' | /usr/bin/mokutil --import /usr/share/pki/akmods/certs/akmods-secureblue.der\"\n\
        ExecStart=/usr/bin/ujust dns-selector resolver unbound\n\
        ExecStart=/usr/bin/sed -i 's/^AutomaticUpdatePolicy=staged$/AutomaticUpdatePolicy=apply/' /etc/rpm-ostreed.conf\n\
        ExecStart=/usr/bin/ujust dns-selector dnssec on\n\
        ExecStart=/usr/bin/install -d -o thefutureisprivate -g thefutureisprivate -m 700 /var/home/thefutureisprivate/.config\n\
        ExecStart=/usr/bin/install -o thefutureisprivate -g thefutureisprivate -m 600 /dev/null /var/home/thefutureisprivate/.config/no-show-user-motd\n\
        ExecStart=/usr/bin/ujust toggle-bash-environment-lockdown true true\n\
        ExecStart=/usr/bin/ujust set-container-userns on\n\
        ExecStart=/usr/bin/rpm-ostree install qemu-guest-agent\n\
        ExecStart=/usr/bin/systemctl disable rebase\n\
        ExecStart=/usr/bin/rm /etc/systemd/system/rebase.service\n\
        ExecStart=/usr/bin/rm /var/lib/rebase.stamp\n\
        ExecStart=/usr/bin/systemctl disable postrebase\n\
        ExecStart=/usr/bin/rm /etc/systemd/system/postrebase.service\n\
        ExecStart=/usr/bin/systemctl --no-block reboot\n\
        [Install]\n\
        WantedBy=multi-user.target"
      # yamllint enable rule:line-length

    - name: 'podman-auto-update.timer'
      enabled: true

    - name: 'rpm-ostreed-automatic.timer'
      enabled: true

storage:
  files:
    - path: '/etc/pki/containers/secureblue-2025.pub'
      contents:
        inline: "-----BEGIN PUBLIC KEY-----\n\
          MFkwEwYHKoZIzj0CAQYIKoZIzj0DAQcDQgAEdruKsOhUkgdd0lNDHNBymE2Wyb/p\n\
          GVnx59QbNoGFbImqZLRVt6uQnO9MfiHU9IZiJl9aNetfAqDsgsltAUQnXQ==\n\
          -----END PUBLIC KEY-----"

    - path: '/etc/containers/policy.json'
      overwrite: true
      contents:
        inline: "{\n\
          \"default\": [{\"type\": \"reject\"}],\n\
          \"transports\": {\n\
            \"docker\": {\n\
              \"ghcr.io/secureblue\": [\n\
                {\n\
                  \"type\": \"sigstoreSigned\",\n\
                  \"keyPath\": \"/etc/pki/containers/secureblue-2025.pub\",\n\
                  \"signedIdentity\": {\"type\": \"matchRepository\"}\n\
                }\n\
              ]\n\
            }\n\
          }\n\
        }"

    - path: '/etc/sysctl.d/99-gvisor-ptrace.conf'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/sysctl.d/99-gvisor-ptrace.conf' # yamllint disable-line rule:line-length

    - path: '/etc/sysctl.d/90-podman-ipv6-forwarding.conf'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/sysctl.d/90-podman-ipv6-forwarding.conf' # yamllint disable-line rule:line-length

    - path: '/etc/ssh/sshd_config.d/10-custom.conf'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/ssh/sshd_config.d/10-custom.conf' # yamllint disable-line rule:line-length

    - path: '/etc/polkit-1/rules.d/49-run0-auth-keep.rules'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/polkit-1/rules.d/49-run0-auth-keep.rules' # yamllint disable-line rule:line-length

    - path: '/etc/polkit-1/polkitd.conf'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/polkit-1/polkitd.conf' # yamllint disable-line rule:line-length

    - path: '/etc/containers/containers.conf'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/containers/containers.conf' # yamllint disable-line rule:line-length

    - path: '/etc/systemd/system/gvisor-auto-update.service'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/systemd/system/gvisor-auto-update.service' # yamllint disable-line rule:line-length

    - path: '/etc/systemd/system/gvisor-auto-update.timer'
      contents:
        source: 'https://raw.githubusercontent.com/thefutureisprivate/securecore-ignition/main/files/etc/systemd/system/gvisor-auto-update.timer' # yamllint disable-line rule:line-length

  links:
    - path: '/etc/systemd/system/timers.target.wants/gvisor-auto-update.timer'
      target: '/etc/systemd/system/gvisor-auto-update.timer'
